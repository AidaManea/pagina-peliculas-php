<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

</head>

<body>
    <div class="login-box">
        <div class="lado-izquierdo">
            <h1 class="animate__animated animate__fadeInDown">Registrate con nosotros!</h1>
            <p class="animate__animated animate__fadeInDown">Con filmora podrás consultar todas tus peliculas favoritas
                y estar en las ultimas del mundo del cine!</p>
        </div>

        <div class="lado-derecho">
            <img src="../assets/filmora-logo2.png" alt="no hay imagen que enseñar aqui" name="img-logo"
                class="animate__animated animate__fadeInDown">

            <div id="registroError" class="alert alert-danger" style="display: none; color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; padding: .75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: .25rem;"></div>

            <form id="registroForm" class="animate__animated animate__fadeInDown">
                <label for="username">Nombre</label>
                <input type="text" id="username" name="user" placeholder="Ingresa tu nombre">

                <label for="email">Correo electronico</label>
                <input type="email" id="email" name="email" placeholder="Ingresa tu email">

                <label for="pass">Contraseña</label>
                <input type="password" id="pass" name="pass" placeholder="Contraseña">

                <label for="repPass">Repite tu contraseña!</label>
                <input type="password" id="repPass" placeholder="Repite la contraseña">

                <button type="submit" id="submit">Registrate</button>

            </form>

            <p class="ir-login">
                ¿Ya tienes cuenta?
                <a href="login.html">Inicia sesión</a>
            </p>
        </div>
    </div>

    <script src='auth.js'></script>
</body>

</html>
