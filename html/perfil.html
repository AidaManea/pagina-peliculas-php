<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Tu perfil en Filmora. Gestiona tus datos y preferencias.">
    <title>Mi perfil - Filmora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos propios -->
    <link rel="stylesheet" type="text/css" media="screen" href="../css/perfil.css">
</head>

<body>
    <header>
        <nav>
            <a href="index.html">
                <img src="../assets/logo-simple.png" alt="Filmora">
            </a>
            <h2>Filmora</h2>
            <div class="links">
                <a href="index.html">Inicio</a>
                <a href="recomendados.html">Recomendados</a>
                <a href="pagLista.html">Mi lista</a>
                <a href="perfil.html" class="account">Perfil</a>
            </div>
        </nav>
    </header>

    <main class="perfil-contenido container py-4">
        <div class="row g-4">
            <section class="col-lg-4">
                <div class="perfil-card h-100">
                    <div class="perfil-avatar">
                        <img src="../assets/defaultpfp.jpg" alt="Foto de perfil" class="avatar-img">
                    </div>
                    <h1 class="perfil-nombre">Usuario</h1>
                    <p class="perfil-email">usuario@ejemplo.com</p>

                    <div class="perfil-datos">
                        <div class="dato">
                            <span class="dato-label">Mi lista</span>
                            <span class="dato-valor" id="perfilMiLista">0</span>
                        </div>
                        <div class="dato">
                            <span class="dato-label">Vistas</span>
                            <span class="dato-valor" id="perfilVistas">0</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="col-lg-8">
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <h2 class="h5 mb-3">Datos personales</h2>
                        <form id="formDatos">
                            <div id="datosError" class="alert alert-danger" style="display: none; color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; padding: .75rem 1.25rem; margin-bottom: 1rem;"></div>
                            <div id="datosSuccess" class="alert alert-success" style="display: none; color: #155724; background-color: #d4edda; border-color: #c3e6cb; padding: .75rem 1.25rem; margin-bottom: 1rem;"></div>

                            
                            <div class="mb-3">
                                <label for="perfilNombre" class="form-label">Nombre de usuario</label>
                                <input type="text" class="form-control" id="perfilNombre" name="usuario" placeholder="Tu usuario">
                            </div>
                            <div class="mb-3">
                                <label for="perfilEmail" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="perfilEmail" name="email"
                                    placeholder="tucorreo@ejemplo.com">
                            </div>
                            <div class="text-end">
                                <button type="submit" class="btn btn-dark">Guardar cambios</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="h5 mb-3">Cambio de contraseña</h2>
                        <form id="formPassword">
                            <div id="passError" class="alert alert-danger" style="display: none; color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; padding: .75rem 1.25rem; margin-bottom: 1rem;"></div>
                            <div id="passSuccess" class="alert alert-success" style="display: none; color: #155724; background-color: #d4edda; border-color: #c3e6cb; padding: .75rem 1.25rem; margin-bottom: 1rem;"></div>

                            <div class="mb-3">
                                <label for="oldPass" class="form-label">Contraseña actual</label>
                                <input type="password" class="form-control" id="oldPass" name="oldPass"
                                    placeholder="Contraseña actual">
                            </div>
                            <div class="mb-3">
                                <label for="newPass" class="form-label">Nueva contraseña</label>
                                <input type="password" class="form-control" id="newPass" name="newPass" placeholder="Nueva contraseña">
                            </div>
                            <div class="mb-3">
                                <label for="repNewPass" class="form-label">Repite la nueva contraseña</label>
                                <input type="password" class="form-control" id="repNewPass" name="repNewPass"
                                    placeholder="Repite la nueva contraseña">
                            </div>
                            <div class="text-end">
                                <button type="submit" class="btn btn-outline-dark">Actualizar contraseña</button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div>
                <div class="footer-brand">Filmora</div>
                <small>Tu app para organizar y descubrir películas.</small>
            </div>
            <div>
                <div class="footer-brand">Enlaces rápidos</div>
                <div><a href="index.html">Inicio</a></div>
                <div><a href="recomendados.html">Recomendados</a></div>
                <div><a href="pagLista.html">Mi lista</a></div>
                <div><a href="perfil.html">Mi perfil</a></div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch("../PHP/getPerfilDatos.php", {
                method: "GET",
                credentials: "include"
            })
                .then((res) => res.json())
                .then((data) => {
                    if (!data.success) {
                        return;
                    }

                    const nombreEl = document.querySelector(".perfil-nombre");
                    const emailEl = document.querySelector(".perfil-email");
                    const miListaEl = document.getElementById("perfilMiLista");
                    const vistasEl = document.getElementById("perfilVistas");
                    
                    const inputNombre = document.getElementById("perfilNombre");
                    const inputEmail = document.getElementById("perfilEmail");

                    if (nombreEl) nombreEl.textContent = data.usuario || "Usuario";
                    if (emailEl) emailEl.textContent = data.email || "";
                    if (miListaEl) miListaEl.textContent = data.totalFavoritas ?? 0;
                    if (vistasEl) vistasEl.textContent = data.totalVistas ?? 0;
                    
                    if (inputNombre) inputNombre.value = data.usuario || "";
                    if (inputEmail) inputEmail.value = data.email || "";
                })
                .catch(() => {
                    // Si falla la llamada simplemente dejamos los valores por defecto
                });
                
            const formDatos = document.getElementById("formDatos");
            if (formDatos) {
                formDatos.addEventListener("submit", (e) => {
                    e.preventDefault();
                    const formData = new FormData(formDatos);
                    formData.append("action", "updateDatos");
                    
                    const errorBox = document.getElementById("datosError");
                    const successBox = document.getElementById("datosSuccess");
                    errorBox.style.display = "none";
                    successBox.style.display = "none";

                    fetch("../PHP/updatePerfil.php", {
                        method: "POST",
                        body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        if(data.success) {
                            successBox.textContent = data.message;
                            successBox.style.display = "block";
                            const nombreEl = document.querySelector(".perfil-nombre");
                            const emailEl = document.querySelector(".perfil-email");
                            if (nombreEl) nombreEl.textContent = document.getElementById("perfilNombre").value;
                            if (emailEl) emailEl.textContent = document.getElementById("perfilEmail").value;
                            alert("¡Datos actualizados con éxito!");
                        } else {
                            errorBox.textContent = data.message;
                            errorBox.style.display = "block";
                            alert("Error: " + data.message);
                        }
                    })
                    .catch(err => {
                        errorBox.textContent = "Error de conexión al servidor.";
                        errorBox.style.display = "block";
                        alert("Error de conexión al servidor.");
                    });
                });
            }

            const formPassword = document.getElementById("formPassword");
            if (formPassword) {
                formPassword.addEventListener("submit", (e) => {
                    e.preventDefault();
                    
                    const newPass = document.getElementById("newPass").value;
                    const repNewPass = document.getElementById("repNewPass").value;
                    
                    const errorBox = document.getElementById("passError");
                    const successBox = document.getElementById("passSuccess");
                    errorBox.style.display = "none";
                    successBox.style.display = "none";
                    
                    if (newPass !== repNewPass) {
                         errorBox.textContent = "Las contraseñas nuevas no coinciden.";
                         errorBox.style.display = "block";
                         alert("Las contraseñas nuevas no coinciden.");
                         return;
                    }

                    const formData = new FormData(formPassword);
                    formData.append("action", "updatePassword");

                    fetch("../PHP/updatePerfil.php", {
                        method: "POST",
                        body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        if(data.success) {
                            successBox.textContent = data.message;
                            successBox.style.display = "block";
                            formPassword.reset();
                            alert("¡Contraseña actualizada con éxito!");
                        } else {
                            errorBox.textContent = data.message;
                            errorBox.style.display = "block";
                            alert("Error: " + data.message);
                        }
                    })
                    .catch(err => {
                        errorBox.textContent = "Error de conexión al servidor.";
                        errorBox.style.display = "block";
                        alert("Error de conexión al servidor.");
                    });
                });
            }
        });
    </script>
</body>

</html>
