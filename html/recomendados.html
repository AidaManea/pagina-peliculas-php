<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
        content="Películas recomendadas por Filmora. Filtra por año y descubre nuevas joyas del cine.">
    <title>Recomendadas - Filmora</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos propios -->
    <link rel="stylesheet" type="text/css" media="screen" href="../css/recomendados.css">
</head>

<body>
    <header>
        <nav>
            <a href="index.html">
                <img src="../assets/logo-simple.png" alt="Filmora">
            </a>
            <h2>Filmora</h2>
            <div class="links">
                <a href="index.html">Inicio</a>
                <a href="recomendados.html">Recomendados</a>
                <a href="pagLista.html">Mi lista</a>
                <a href="perfil.html" class="account">Perfil</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="reco-contenido">
            <div class="reco-header">
                <div>
                    <h1>Películas recomendadas</h1>
                    <p>Explora recomendaciones y filtra por año de estreno.</p>
                </div>
                <div class="filtro">
                    <label for="filtroAnio">Filtrar por año</label>
                    <select id="filtroAnio">
                        <option value="todos">Todos</option>
                        <option value="antes2000">Antes de 2000</option>
                        <option value="2000_2010">2000 – 2010</option>
                        <option value="despues2010">Después de 2010</option>
                    </select>
                </div>
            </div>

            <div class="peliculas-grid" id="gridRecomendados">
                <!-- Se rellena con JS desde la API -->
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div>
                <div class="footer-brand">Filmora</div>
                <small>Tu app para organizar y descubrir películas.</small>
            </div>
            <div>
                <div class="footer-brand">Enlaces rápidos</div>
                <div><a href="index.html">Inicio</a></div>
                <div><a href="recomendados.html">Recomendados</a></div>
                <div><a href="pagLista.html">Mi lista</a></div>
                <div><a href="perfil.html">Mi perfil</a></div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="favoritos.js"></script>
    <script src="recomendados.js"></script>
</body>

</html>
