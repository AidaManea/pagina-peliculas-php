<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

</head>

<body>
    <div class="login-box">
        <div class="lado-izquierdo">
            <h1 class="animate__animated animate__fadeInDown">Bienvenidx de nuevo</h1>
            <p class="animate__animated animate__fadeInDown">Inicia sesión para ver tus películas favoritas y seguir tu
                lista.</p>
        </div>

        <div class="lado-derecho">
            <img src="../assets/filmora-logo2.png" alt="no hay imagen que enseñar aqui" name="img-logo"
                class="animate__animated animate__fadeInDown">

            <div id="loginError" class="alert alert-danger" style="display: none; color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; padding: .75rem 1.25rem; margin-bottom: 1rem; border: 1px solid transparent; border-radius: .25rem;"></div>

            <form id="loginForm" class="animate__animated animate__fadeInDown">
                <label for="loginUser">Nombre</label>
                <input type="text" id="loginUser" name="user" placeholder="Ingresa tu nombre">

                <label for="loginEmail">Correo electronico</label>
                <input type="email" id="loginEmail" name="email" placeholder="Ingresa tu email">

                <label for="loginPass">Contraseña</label>
                <input type="password" id="loginPass" name="pass" placeholder="Contraseña">

                <button type="submit" id="submit">Inicia sesión</button>
            </form>

            <p class="ir-registro">
                ¿No tienes cuenta?
                <a href="Registro.html">Regístrate</a>
            </p>
        </div>
    </div>

    <script src='auth.js'></script>
</body>

</html>
